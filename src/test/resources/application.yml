default-bank:
  bank:
    name: "LLC DefaultBank"
    partner:
      prefix-url: "http://localhost:8080"
server:
  port: 8081

spring:
  main:
    allow-bean-definition-overriding: true

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  jpa:
    hibernate:
      show-sql: true
      ddl-auto: validate
    defer-datasource-initialization: false

  datasource:
    url: jdbc:h2:mem:online_bank_test
    username: test_name
    password: 1234
    hikari:
      allow-pool-suspension: true

    driverClassName: org.h2.Driver

  mail:
    host: smtp.gmail.com
    port: 587
    username: test@email.com
    password: 1234

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

logging:
  level:
    org:
      hibernate:
        SQL: trace
        orm:
          jdbc:
            bind: TRACE

jwt:
  access-token-lifetime: 15m
  refresh-token-lifetime: 30d
  id-token-lifetime: 30d
  not-before: 10s
  filename: jwt_secret_file_name
  audience: "online_bank audience"
  issuer: "com.example"

app:
  cors:
    allowed-origins: https://online-bank-hyper-revolution-comput.vercel.app

resend:
  api-key: "RESEND_API_KEY"
